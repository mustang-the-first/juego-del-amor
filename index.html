<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Juego del Amor Ideológico</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background-color: #1a1a2e;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

#juego {
    text-align: center;
    background-color: #16213e;
    padding: 40px;
    border-radius: 20px;
    max-width: 400px;
}

h1 {
    color: #e94560;
}

p {
    color: #a8a8b3;
}

button {
    background-color: #e94560;
    color: white;
    border: none;
    padding: 15px 40px;
    margin: 10px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background-color: #c81e45;
}
    </style>
</head>
<body>
<div id="juego">
    <h1>Juego del Amor Ideológico</h1>
    <p>Donde comprobaremos si el amor es amigo o enemigo</p>

<div id="Pregunta-individuo">
  <h2>¿Usted es...?</h2>
  <button onclick="elegirIndividuo('peronista')">Peronista</button>
  <button onclick="elegirIndividuo('gorila')">Gorila</button>
</div>

  <div id="Pregunta-pareja" style="display: none;">
    <h2>¿Su pareja es...?</h2>
    <button onclick="elegirPareja('peronista')">Peronista</button>
    <button onclick="elegirPareja('gorila')">Gorila</button>
  </div>

  <div id="resultado" style="display: none;">
    <h2 id="texto-resultado"></h2>
    <button onclick="reiniciar()">Jugar de nuevo</button>
  </div>

</div>

  <script>
   let individuo = "";
   let pareja = "";

function elegirIndividuo(eleccion) {
    individuo = eleccion;
    document.getElementById("Pregunta-individuo").style.display = "none";
    document.getElementById("Pregunta-pareja").style.display = "block";
}

function elegirPareja(eleccion) {
  pareja = eleccion;
  document.getElementById("Pregunta-pareja").style.display = "none";
  document.getElementById("resultado").style.display = "block";

  let compatible = individuo === pareja;
  let texto = "Usted es " + individuo + " y su pareja es " + pareja;

  if (compatible) {
    texto += ", por lo tanto, son compatibles.";
  } else {
    texto += ", por lo tanto, son incompatibles.";
  }
  document.getElementById("texto-resultado").textContent = texto;
}

function reiniciar() {
  individuo = "";
  pareja = "";
  document.getElementById("resultado").style.display = "none";
  document.getElementById("Pregunta-individuo").style.display = "block";
}


  </script>
</body>
</html>
